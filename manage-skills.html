<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Skills - PARMAR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    margin-bottom:30px;
    color:#111827;
}

.skill-form{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    margin-bottom:30px;
}

.skill-form input,
.skill-form select{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:16px;
}

.skill-form button{
    background:#38bdf8;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

.skill-form button:hover{
    background:#0ea5e9;
}

.skills-table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.skills-table th,
.skills-table td{
    padding:16px;
    text-align:left;
    border-bottom:1px solid #e5e7eb;
}

.skills-table th{
    background:#111827;
    color:white;
}

.edit-btn,
.delete-btn{
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    color:white;
}

.edit-btn{
    background:#f59e0b;
}

.delete-btn{
    background:#ef4444;
}

.back{
    display:inline-block;
    margin-top:25px;
    text-decoration:none;
    background:#111827;
    color:white;
    padding:12px 18px;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

```
<h1>Manage Skills</h1>

<form id="skillForm" class="skill-form">

    <input type="text" id="skillTitle" placeholder="Skill Name" required>

    <input type="text" id="skillDescription" placeholder="Skill Description" required>

    <button type="submit">Add Skill</button>

</form>

<table class="skills-table">

    <thead>
        <tr>
            <th>Skill</th>
            <th>Description</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="skillsTable">
        <tr>
            <td colspan="3">Loading skills...</td>
        </tr>
    </tbody>

</table>

<a href="dashboard.html" class="back">← Back to Dashboard</a>
```

</div>

<script>
async function loadSkills(){

    const tbody = document.getElementById('skillsTable');

    const response = await fetch('/api/skills');
    const skills = await response.json();

    tbody.innerHTML = '';

    skills.forEach(skill => {

        tbody.innerHTML += `
            <tr>
                <td>${skill.title}</td>
                <td>${skill.description}</td>
                <td>
                    <button class="edit-btn"
                        onclick="editSkill(${skill.id}, '${skill.title}', '${skill.description}')">
                        Edit
                    </button>

                    <button class="delete-btn"
                        onclick="deleteSkill(${skill.id})">
                        Delete
                    </button>
                </td>
            </tr>
        `;

    });

}

document.getElementById('skillForm').addEventListener('submit', async (e) => {

    e.preventDefault();

    const title = document.getElementById('skillTitle').value;
    const description = document.getElementById('skillDescription').value;

    const response = await fetch('/add-skill', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body:JSON.stringify({
            title:title,
            description:description
        })
    });

    const result = await response.text();

    alert(result);

    document.getElementById('skillForm').reset();

    loadSkills();

});

async function editSkill(id, oldTitle, oldDescription){

    const newTitle = prompt('Edit skill title:', oldTitle);
    if(newTitle === null) return;

    const newDescription = prompt('Edit skill description:', oldDescription);
    if(newDescription === null) return;

    await fetch(`/update-skill/${id}`, {
        method:'PUT',
        headers:{ 'Content-Type':'application/json' },
        body:JSON.stringify({
            title:newTitle,
            description:newDescription
        })
    });

    loadSkills();
}

async function deleteSkill(id){

    if(!confirm('Delete this skill?')) return;

    await fetch(`/delete-skill/${id}`, {
        method:'DELETE'
    });

    loadSkills();
}

loadSkills();
</script>

</body>
</html>
