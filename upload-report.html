<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Report - PARMAR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
    padding:40px;
}

.container{
    max-width:850px;
    margin:auto;
}

h1{
    margin-bottom:30px;
    color:#111827;
}

.report-form{
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.report-form label{
    display:block;
    margin:18px 0 8px;
    font-weight:600;
    color:#334155;
}

.report-form input,
.report-form textarea,
.report-form select{
    width:100%;
    padding:14px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:16px;
    outline:none;
    transition:.3s;
}

.report-form input:focus,
.report-form textarea:focus,
.report-form select:focus{
    border-color:#38bdf8;
    box-shadow:0 0 0 4px rgba(56,189,248,.18);
}

.report-form textarea{
    resize:vertical;
}

.actions{
    margin-top:28px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    text-decoration:none;
    transition:.3s;
}

.btn-primary{
    background:#38bdf8;
    color:white;
}

.btn-primary:hover{
    background:#0ea5e9;
}

.btn-secondary{
    background:#111827;
    color:white;
}

.btn-secondary:hover{
    background:#1f2937;
}

.btn-danger{
    background:#ef4444;
    color:white;
}

.btn-danger:hover{
    background:#dc2626;
}

.preview{
    margin-top:25px;
    background:white;
    border:1px dashed #94a3b8;
    border-radius:14px;
    padding:20px;
}

.preview h3{
    margin-bottom:10px;
    color:#111827;
}

.preview p{
    color:#475569;
    line-height:1.7;
}

.report-item{
    background:white;
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:18px;
    margin-top:15px;
    box-shadow:0 4px 10px rgba(0,0,0,.05);
}

.report-item h3{
    color:#111827;
    margin-bottom:8px;
}

.report-item p{
    color:#475569;
    margin-bottom:15px;
}

.report-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
</style>

</head>

<body>

<div class="container">

```
<h1>Upload Report</h1>

<form class="report-form" id="reportForm"
      action="/upload-report"
      method="POST"
      enctype="multipart/form-data">

    <label>Report Title</label>
    <input type="text" id="reportTitle" name="title"
           placeholder="Sales Analysis Report" required>

    <label>Category</label>
    <select id="reportCategory">
        <option value="">Select Category</option>
        <option>Power BI</option>
        <option>SQL</option>
        <option>Python</option>
        <option>Data Analytics</option>
        <option>Machine Learning</option>
    </select>

    <label>Description</label>
    <textarea id="reportDesc" name="description" rows="5"
              placeholder="Write a short report description..." required></textarea>

    <label>Upload PDF Report</label>
    <input type="file" name="report" accept=".pdf" required>

    <label>Report Date</label>
    <input type="date">

    <div class="actions">
        <button type="submit" class="btn btn-primary">Upload Report</button>
        <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
    </div>

</form>

<div class="preview">
    <h3>Preview</h3>
    <p id="previewText">Report preview will appear here.</p>
</div>

<div class="preview">
    <h3>Uploaded Reports</h3>
    <div id="reportsTable">
        <p>Loading reports...</p>
    </div>
</div>
```

</div>

<script>

const reportForm = document.getElementById('reportForm');
const previewText = document.getElementById('previewText');

// Live preview
reportForm.addEventListener('input', () => {

    const title = document.getElementById('reportTitle').value;
    const category = document.getElementById('reportCategory').value;
    const desc = document.getElementById('reportDesc').value;

    previewText.innerHTML = `
        <strong>${title || 'Report Title'}</strong><br><br>
        <strong>Category:</strong> ${category || 'Not selected'}<br><br>
        ${desc || 'Report description will appear here.'}
    `;
});

// Load reports from database
async function loadReports(){

    const container = document.getElementById('reportsTable');

    try {

        const response = await fetch('/api/reports');
        const reports = await response.json();

        container.innerHTML = '';

        if(reports.length === 0){
            container.innerHTML = '<p>No reports uploaded yet.</p>';
            return;
        }

        reports.forEach(report => {

            container.innerHTML += `
                <div class="report-item">

                    <h3>${report.title}</h3>

                    <p>${report.description}</p>

                    <div class="report-actions">

                        <a href="/uploads/reports/${report.file}"
                           target="_blank"
                           class="btn btn-primary">
                           View PDF
                        </a>

                        <button class="btn btn-secondary"
                            onclick="editReport(${report.id}, '${report.title}', '${report.description}')">
                            Edit
                        </button>

                        <button class="btn btn-danger"
                            onclick="deleteReport(${report.id})">
                            Delete
                        </button>

                    </div>

                </div>
            `;

        });

    } catch(error){

        console.log(error);
        container.innerHTML = '<p>Error loading reports.</p>';

    }

}

// Edit report
async function editReport(id, oldTitle, oldDescription){

    const newTitle = prompt('Edit report title:', oldTitle);
    if(newTitle === null) return;

    const newDescription = prompt('Edit report description:', oldDescription);
    if(newDescription === null) return;

    const response = await fetch(`/update-report/${id}`, {
        method:'PUT',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            title:newTitle,
            description:newDescription
        })
    });

    const result = await response.text();

    alert(result);

    loadReports();

}

// Delete report
async function deleteReport(id){

    if(!confirm('Delete this report?')){
        return;
    }

    const response = await fetch(`/delete-report/${id}`, {
        method:'DELETE'
    });

    const result = await response.text();

    alert(result);

    loadReports();

}

// Initial load
loadReports();

</script>

</body>
</html>
