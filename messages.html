<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Messages - PARMAR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
    padding:40px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

h1{
    color:#111827;
}

.search-box input{
    padding:12px 14px;
    width:260px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:15px;
}

.table-wrapper{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:18px;
    text-align:left;
    border-bottom:1px solid #e5e7eb;
}

th{
    background:#111827;
    color:white;
}

.status{
    padding:6px 12px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
}

.new{
    background:#dbeafe;
    color:#1d4ed8;
}

.replied{
    background:#dcfce7;
    color:#166534;
}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.btn{
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-size:14px;
}

.reply{
    background:#2563eb;
}

.mark{
    background:#16a34a;
}

.delete{
    background:#ef4444;
}

.footer-actions{
    margin-top:22px;
}

.link-btn{
    text-decoration:none;
    background:#111827;
    color:white;
    padding:12px 18px;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

```
<div class="topbar">

    <h1>Contact Messages</h1>

    <div class="search-box">
        <input type="text" placeholder="Search messages...">
    </div>

</div>

<div class="table-wrapper">

    <table>

    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Subject</th>
            <th>Message</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="messagesTable">

        <tr>
            <td colspan="7">Loading messages...</td>
        </tr>

    </tbody>

</table>

</div>

<div class="footer-actions">
    <a href="dashboard.html" class="link-btn">← Back to Dashboard</a>
</div>
```

</div>

<script>

async function loadMessages(){

    const tbody = document.getElementById('messagesTable');

    const response = await fetch('/api/messages');
    const messages = await response.json();

    tbody.innerHTML = '';

    if(messages.length === 0){

        tbody.innerHTML = `
            <tr>
                <td colspan="7">No messages found.</td>
            </tr>
        `;
        return;

    }

    messages.forEach(msg => {

        const date = new Date(msg.created_at).toLocaleString();

        tbody.innerHTML += `
            <tr>
                <td>${msg.id}</td>
                <td>${msg.name}</td>
                <td>${msg.email}</td>
                <td>${msg.subject}</td>
                <td>${msg.message}</td>
                <td>${date}</td>
                <td>
                    <div class="actions">
                        <button class="btn delete"
                            onclick="deleteMessage(${msg.id})">
                            Delete
                        </button>
                    </div>
                </td>
            </tr>
        `;

    });

}

async function deleteMessage(id){

    if(!confirm('Delete this message?')){
        return;
    }

    const response = await fetch(`/delete-message/${id}`,{
        method:'DELETE'
    });

    const result = await response.text();

    alert(result);

    loadMessages();

}

loadMessages();

</script>

</body>
</html>
