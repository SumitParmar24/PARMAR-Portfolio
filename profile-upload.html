<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Profile Photo</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f1f5f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    border-radius:16px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    text-align:center;
}

input{
    margin:20px 0;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="box">

    <h2>Upload Profile Photo</h2>

    <form action="/upload-profile" method="POST" enctype="multipart/form-data">

        <input type="file" name="profile" accept="image/*" required>

        <button type="submit">Upload Photo</button>

    </form>

</div>

</body>
</html>
