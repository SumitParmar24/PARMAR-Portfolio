<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Projects - PARMAR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
    padding:40px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

h1{
    color:#111827;
}

.search-box input{
    padding:12px 14px;
    width:260px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:15px;
}

.table-wrapper{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:18px;
    text-align:left;
    border-bottom:1px solid #e5e7eb;
}

th{
    background:#111827;
    color:white;
}

.status{
    padding:6px 12px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
}

.live{
    background:#dcfce7;
    color:#166534;
}

.draft{
    background:#fef3c7;
    color:#92400e;
}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.btn{
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-size:14px;
}

.edit{
    background:#f59e0b;
}

.delete{
    background:#ef4444;
}

.view{
    background:#2563eb;
}

.footer-actions{
    margin-top:22px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.link-btn{
    text-decoration:none;
    background:#111827;
    color:white;
    padding:12px 18px;
    border-radius:10px;
}

.link-btn.secondary{
    background:#38bdf8;
}
</style>

</head>

<body>

<div class="container">

```
<div class="topbar">

    <h1>Manage Projects</h1>

    <div class="search-box">
        <input type="text" placeholder="Search projects...">
    </div>

</div>

<div class="table-wrapper">

    <table>

    <thead>
        <tr>
            <th>ID</th>
            <th>Project</th>
            <th>Description</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="projectsTable">

        <tr>
            <td colspan="4">Loading projects...</td>
        </tr>

    </tbody>

</table>

</div>

<div class="footer-actions">

    <a href="add-project.html" class="link-btn secondary">+ Add New Project</a>

    <a href="dashboard.html" class="link-btn">← Back to Dashboard</a>

</div>
```

</div>

<script>

async function loadProjects(){

    const tbody = document.getElementById('projectsTable');

    const response = await fetch('/api/projects');
    const projects = await response.json();

    tbody.innerHTML = '';

    if(projects.length === 0){

        tbody.innerHTML = `
            <tr>
                <td colspan="4">No projects found.</td>
            </tr>
        `;
        return;

    }

    projects.forEach(project => {

        tbody.innerHTML += `
            <tr>
                <td>${project.id}</td>
                <td>${project.title}</td>
                <td>${project.description}</td>
                <td>
                    <div class="actions">
                        <button class="btn delete" onclick="deleteProject(${project.id})">
                            Delete
                        </button>
                    </div>
                </td>
            </tr>
        `;

    });

}

async function deleteProject(id){

    if(!confirm('Are you sure you want to delete this project?')){
        return;
    }

    const response = await fetch(`/delete-project/${id}`, {
        method:'DELETE'
    });

    const result = await response.text();

    alert(result);

    loadProjects();

}

loadProjects();

</script>

</body>
</html>
