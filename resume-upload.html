<style>
    body {
        font-family: Arial, sans-serif;
        background: #f1f5f9;
        padding: 40px;

        max-width: 500px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
    }

    h1 {

    input[type="file"] {

        padding: 12px;
        border: 1px solid #cbd5e1;

    button {
        width: 100%;

        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #1d4ed8;
    }

    .back {
        display: block;
        margin-top: 18px;
        text-align: center;
        text-decoration: none;
        color: #2563eb;
    }
</style>

<div class="container">

    <h1>Upload Resume</h1>

    <form action="/upload-resume" method="POST" enctype="multipart/form-data">

        <input type="file" name="resume" accept=".pdf" required>

        <button type="submit">Upload Resume</button>

    </form>

    <a href="/dashboard" class="back">← Back to Dashboard</a>
